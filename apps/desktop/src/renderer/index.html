<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dj-app</title>
    <style>
      /* Inline so it paints WITH the HTML — before the JS bundle loads/evaluates,
         covering the gap before React mounts (was a black screen on launch). React's
         render replaces #root's contents, removing this automatically. */
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0e1014;
        color: #cdd3df;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: radial-gradient(1200px 500px at 50% -10%, #141a26 0%, transparent 70%), #0e1014;
      }
      #boot .brand {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      #boot .sub {
        font-size: 12px;
        color: #7c879b;
      }
      #boot .ring {
        width: 34px;
        height: 34px;
        border: 3px solid #2a3344;
        border-top-color: #5b8cff;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div class="ring"></div>
        <div class="brand">dj-app</div>
        <div class="sub">starting…</div>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
